{% load static %}

<div class="toast-container message-container" >
    <div class="toast pe-3 mb-3" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="false" >
      <div class="toast-body toast-error">
        <div class="row ">
          <div class="col-1 ms-auto">
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        </div>
        <div class="row align-contents-center text-start">
          <div class="col-3">
            <img src="{% static 'images/red.png' %}" class="logo-toast" alt="Logo in error colours">
          </div>
          <div class="col-9">
            {{ message | safe }}
          </div>
      </div>
    </div>
  </div>
